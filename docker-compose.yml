services:
  api:
    build: .
    container_name: ticportal-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "5005"
      NODE_ENV: production
      TRUST_PROXY: "true"
    expose:
      - "5005"
    networks:
      - ticportal

  caddy:
    image: caddy:2-alpine
    container_name: ticportal-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - ticportal

networks:
  ticportal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
